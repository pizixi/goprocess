<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务管理</title>
    <link rel="stylesheet" href="/static/layui-v2.9.14/layui/css/layui.css">
    <link rel="stylesheet" href="/static/logs.css">
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: rgba(255, 255, 255, 0.96);
            --border: #e6ebf2;
            --text: #0f172a;
            --muted: #64748b;
            --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            --primary: #0f766e;
            --primary-dark: #115e59;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #f8fafc 0%, #f3f6fb 100%);
            color: var(--text);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .page-shell {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100vh;
            padding: 10px 12px 12px;
            box-sizing: border-box;
        }

        .page-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 252, 0.96) 100%);
            box-shadow: var(--shadow);
        }

        .page-title {
            display: flex;
            align-items: center;
            flex: 0 0 auto;
            min-width: 86px;
        }

        .page-title h1 {
            margin: 0;
            font-size: 18px;
            line-height: 1.2;
            font-weight: 700;
            white-space: nowrap;
        }

        #addTaskBtn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: auto;
            height: 36px;
            padding: 0 14px;
            border: 1px solid rgba(15, 118, 110, 0.28);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 2px 8px rgba(15, 118, 110, 0.08);
            color: var(--primary);
            font-size: 14px;
            font-weight: 700;
            flex: 0 0 auto;
            cursor: pointer;
            transition: transform 0.16s ease, color 0.16s ease, opacity 0.16s ease;
        }

        #addTaskBtn:hover {
            color: var(--primary-dark);
            border-color: rgba(15, 118, 110, 0.48);
            background: #fff;
            opacity: 1;
            transform: translateY(-1px);
        }

        #addTaskBtn svg {
            width: 20px;
            height: 20px;
            display: block;
            stroke: currentColor;
        }

        .action-icon-btn svg,
        .inline-svg {
            width: 22px;
            height: 22px;
            display: block;
            stroke: currentColor;
        }

        .add-button-text {
            line-height: 1;
            white-space: nowrap;
        }

        .button-svg {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 6px;
            vertical-align: -3px;
            stroke: currentColor;
        }

        .button-svg svg {
            width: 16px;
            height: 16px;
            display: block;
            stroke: currentColor;
        }

        .table-panel {
            flex: 1;
            min-height: 0;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .filter-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 640px;
            min-width: 320px;
            flex-wrap: wrap;
            padding: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
        }

        .filter-field {
            display: flex;
            min-width: 116px;
            flex: 0 0 128px;
        }

        .filter-field-keyword {
            flex: 1 1 260px;
            min-width: 220px;
        }

        .filter-field label {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .filter-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .filter-input-wrap svg {
            position: absolute;
            left: 11px;
            width: 17px;
            height: 17px;
            color: #64748b;
            stroke: currentColor;
            pointer-events: none;
        }

        .filter-input-wrap input,
        .filter-field select {
            width: 100%;
            height: 36px;
            border: 1px solid #d8e1ec;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.92);
            color: #0f172a;
            font-size: 14px;
            outline: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .filter-input-wrap input {
            padding: 0 12px 0 36px;
        }

        .filter-field select {
            padding: 0 10px;
        }

        .filter-input-wrap input:focus,
        .filter-field select:focus {
            border-color: rgba(15, 118, 110, 0.52);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .filter-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
            margin-left: 0;
        }

        .filter-count {
            color: #64748b;
            font-size: 13px;
            white-space: nowrap;
            height: 28px;
            line-height: 28px;
            padding: 0 10px;
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            background: rgba(248, 250, 252, 0.92);
        }

        .filter-reset {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 36px;
            padding: 0 12px;
            border: 1px solid #d8e1ec;
            border-radius: 10px;
            background: #ffffff;
            color: #475569;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.16s ease, color 0.16s ease, background 0.16s ease;
        }

        .filter-reset:hover {
            border-color: rgba(15, 118, 110, 0.42);
            background: #f0fdfa;
            color: #115e59;
        }

        .filter-reset svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
        }

        .layui-table-view {
            margin: 0;
            border: none;
        }

        .layui-table-header th {
            background: #f8fafc;
            color: #334155;
            font-weight: 700;
            font-size: 15px;
        }

        .layui-table-body tr:hover {
            background: rgba(15, 118, 110, 0.035);
        }

        .layui-table-cell {
            height: 54px;
            line-height: 54px;
            padding: 0 12px;
            font-size: 15px;
            overflow: hidden !important;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .layui-table-page {
            border-top: 1px solid #eef2f7;
        }

        .status-switch-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            white-space: nowrap;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            white-space: nowrap;
        }

        .action-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            padding: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            cursor: pointer;
            transition: transform 0.16s ease, color 0.16s ease, opacity 0.16s ease;
            opacity: 0.92;
        }

        .action-icon-btn:hover {
            transform: translateY(-1px);
            opacity: 1;
        }

        .action-run {
            color: #15803d;
        }

        .action-log {
            color: #334155;
        }

        .action-edit {
            color: #b45309;
        }

        .action-delete {
            color: #be123c;
        }

        .cell-ellipsis {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .command-cell {
            font-family: Consolas, "SFMono-Regular", "Liberation Mono", monospace;
            color: #1f2937;
            cursor: text;
        }

        .command-popover {
            position: fixed;
            z-index: 19891030;
            display: none;
            width: min(720px, calc(100vw - 24px));
            max-height: min(420px, calc(100vh - 24px));
            border: 1px solid #d7dee8;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.18);
            color: #0f172a;
            overflow: hidden;
        }

        .command-popover.is-open {
            display: block;
        }

        .command-popover__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 42px;
            padding: 8px 10px 8px 14px;
            border-bottom: 1px solid #e7edf5;
            background: #f8fafc;
        }

        .command-popover__title {
            min-width: 0;
            color: #475569;
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
        }

        .command-popover__copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid #d8e1ec;
            border-radius: 8px;
            background: #ffffff;
            color: #0f766e;
            cursor: pointer;
            transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
        }

        .command-popover__copy:hover {
            border-color: rgba(15, 118, 110, 0.42);
            background: #ecfdf5;
            color: #115e59;
        }

        .command-popover__copy svg {
            width: 17px;
            height: 17px;
            stroke: currentColor;
        }

        .command-popover__body {
            max-height: min(377px, calc(100vh - 67px));
            overflow: auto;
            padding: 12px 14px 14px;
        }

        .command-popover__code {
            margin: 0;
            color: #111827;
            font-family: Consolas, "SFMono-Regular", "Liberation Mono", monospace;
            font-size: 13px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            user-select: text;
        }

        .form-shell {
            min-height: 100%;
            padding: 20px 20px 8px;
            background: linear-gradient(180deg, #fbfdff 0%, #f5f8fc 100%);
        }

        .form-shell .layui-form-item {
            margin-bottom: 16px;
        }

        .form-shell .layui-form-label {
            width: 102px;
            padding: 10px 0;
            color: #475569;
            font-weight: 700;
            white-space: nowrap;
        }

        .form-shell .layui-input-block {
            margin-left: 120px;
        }

        .form-shell .layui-input,
        .form-shell .layui-textarea {
            border-radius: 12px;
            border-color: #d9e2ec;
            background: #fff;
        }

        .form-shell .layui-input {
            height: 42px;
        }

        .form-shell .layui-textarea {
            min-height: 150px;
            padding-top: 10px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding-top: 6px;
        }

        .form-actions .layui-btn {
            height: 38px;
            line-height: 38px;
            padding: 0 18px;
            border-radius: 10px;
        }

        .form-actions .layui-btn i {
            margin-right: 6px;
        }

        @media screen and (max-width: 768px) {
            body {
                overflow: auto;
            }

            .page-shell {
                height: auto;
                min-height: 100vh;
                padding: 8px;
            }

            .page-toolbar {
                align-items: stretch;
            }

            .filter-panel {
                flex: 1 1 100%;
                min-width: 0;
                flex-wrap: wrap;
                align-items: stretch;
                gap: 8px;
                padding-top: 8px;
                border-top: 1px solid #eef2f7;
            }

            .filter-field,
            .filter-field-keyword {
                flex: 1 1 100%;
                min-width: 0;
            }

            .filter-actions {
                width: 100%;
                justify-content: space-between;
                margin-left: 0;
            }

            .layui-table-cell {
                height: auto;
                line-height: 1.45;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .action-icon-btn {
                width: 34px;
                height: 34px;
            }

            .action-buttons {
                gap: 8px;
            }

            .form-shell {
                padding: 16px 14px 4px;
            }

            .form-shell .layui-form-label,
            .form-shell .layui-input-block {
                width: auto;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="page-shell">
    <div class="page-toolbar">
        <div class="page-title">
            <h1>定时任务</h1>
        </div>

        <div class="filter-panel" id="taskFilterPanel">
            <div class="filter-field filter-field-keyword">
                <label for="taskKeyword">关键词</label>
                <div class="filter-input-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="6.5"></circle>
                        <path d="m16 16 4 4"></path>
                    </svg>
                    <input type="search" id="taskKeyword" autocomplete="off" placeholder="搜索任务、表达式、目录、命令">
                </div>
            </div>
            <div class="filter-field">
                <label for="taskSearchField">搜索范围</label>
                <select id="taskSearchField">
                    <option value="all">全部字段</option>
                    <option value="name">任务名</option>
                    <option value="cron">定时表达式</option>
                    <option value="workDir">工作目录</option>
                    <option value="command">任务命令</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="taskStatusFilter">状态</label>
                <select id="taskStatusFilter">
                    <option value="all">全部状态</option>
                    <option value="enabled">已启用</option>
                    <option value="disabled">已禁用</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="taskTimeoutFilter">超时</label>
                <select id="taskTimeoutFilter">
                    <option value="all">全部</option>
                    <option value="quick">不超过 1 分钟</option>
                    <option value="hour">不超过 1 小时</option>
                    <option value="long">超过 1 小时</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="taskCronFilter">表达式</label>
                <select id="taskCronFilter">
                    <option value="all">全部</option>
                    <option value="standard">5 段表达式</option>
                    <option value="seconds">含秒表达式</option>
                    <option value="complex">复杂表达式</option>
                </select>
            </div>
            <div class="filter-actions">
                <span class="filter-count" id="taskFilterCount">0 / 0</span>
                <button type="button" class="filter-reset" id="resetTaskFilters" title="重置筛选" aria-label="重置筛选">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M20 12a8 8 0 1 1-2.34-5.66"></path>
                        <path d="M20 4v6h-6"></path>
                    </svg>
                    <span>重置</span>
                </button>
            </div>
        </div>

        <button type="button" id="addTaskBtn" title="添加任务" aria-label="添加任务">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
            </svg>
            <span class="add-button-text">添加任务</span>
        </button>
    </div>

    <div class="table-panel">
        <table class="layui-table" id="taskTable" lay-filter="taskTable"></table>
    </div>
</div>

<script src="/static/layui-v2.9.14/layui/layui.js"></script>
<script>
layui.use(['table', 'form', 'layer'], function () {
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;

    var TABLE_ID = 'taskTable';
    var PAGE_LIMITS = [20, 30, 50, 80];
    var rawTasks = [];
    var allTasks = [];
    var tableInitialized = false;
    var pageState = {
        curr: 1,
        limit: 20
    };
    var DEFAULT_SORT = {
        field: 'ID',
        type: 'desc'
    };
    var sortState = {
        field: DEFAULT_SORT.field,
        type: DEFAULT_SORT.type
    };
    var filterState = {
        keyword: '',
        field: 'all',
        status: 'all',
        timeout: 'all',
        cron: 'all'
    };
    var tooltipIndex = null;
    var commandPopover = null;
    var commandPopoverCode = null;
    var commandHideTimer = null;
    var activeCommandCell = null;

    function debounce(fn, wait) {
        var timer = null;
        return function () {
            var args = arguments;
            clearTimeout(timer);
            timer = setTimeout(function () {
                fn.apply(null, args);
            }, wait);
        };
    }

    function escapeHtml(value) {
        return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function getTableHeight() {
        var panel = document.querySelector('.table-panel');
        if (!panel) {
            return Math.max(320, window.innerHeight - 104);
        }

        var rect = panel.getBoundingClientRect();
        var safeGap = window.innerWidth < 768 ? 22 : 26;
        var panelHeight = panel.clientHeight || (window.innerHeight - rect.top);
        var viewportHeight = window.innerHeight - rect.top;
        var availableHeight = Math.min(panelHeight, viewportHeight) - safeGap;
        return Math.max(240, Math.floor(availableHeight));
    }

    function compareNumber(left, right) {
        return (Number(left) || 0) - (Number(right) || 0);
    }

    function compareText(left, right) {
        return String(left == null ? '' : left).localeCompare(
            String(right == null ? '' : right),
            'zh-Hans-CN',
            { numeric: true, sensitivity: 'base' }
        );
    }

    function compareTaskItems(a, b, field) {
        if (field === 'ID') {
            return compareNumber(a.ID, b.ID);
        }

        if (field === 'isEnabled') {
            return compareNumber(a.isEnabled ? 1 : 0, b.isEnabled ? 1 : 0) || compareText(a.name, b.name);
        }

        return compareText(a[field], b[field]);
    }

    function getPageOptions(curr) {
        return {
            curr: curr || pageState.curr || 1,
            limit: pageState.limit,
            limits: PAGE_LIMITS,
            layout: ['prev', 'page', 'next', 'limit', 'count', 'skip']
        };
    }

    function getInitSort() {
        return {
            field: sortState.field,
            type: sortState.type
        };
    }

    function sortTasks(tasks) {
        return (tasks || []).slice().sort(function (a, b) {
            var result = compareTaskItems(a, b, sortState.field);
            if (result === 0) {
                result = compareNumber(a.ID, b.ID);
            }
            return sortState.type === 'asc' ? result : -result;
        });
    }

    function normalizeSearchText(value) {
        return String(value == null ? '' : value).trim().toLowerCase();
    }

    function getTaskSearchText(task, field) {
        if (field !== 'all') {
            return normalizeSearchText(task[field]);
        }

        return [
            task.ID,
            task.name,
            task.cron,
            task.workDir,
            task.command,
            task.timeout,
            task.isEnabled ? '启用 enabled' : '禁用 disabled'
        ].map(normalizeSearchText).join(' ');
    }

    function getCronParts(cron) {
        return String(cron || '').trim().split(/\s+/).filter(Boolean);
    }

    function matchesCronFilter(task) {
        var cron = String(task.cron || '').trim();
        var parts = getCronParts(cron);

        if (filterState.cron === 'standard') {
            return parts.length === 5;
        }
        if (filterState.cron === 'seconds') {
            return parts.length >= 6;
        }
        if (filterState.cron === 'complex') {
            return /[,/\-]/.test(cron);
        }
        return true;
    }

    function matchesTimeoutFilter(task) {
        var timeout = Number(task.timeout) || 0;
        if (filterState.timeout === 'quick') {
            return timeout > 0 && timeout <= 60;
        }
        if (filterState.timeout === 'hour') {
            return timeout > 0 && timeout <= 3600;
        }
        if (filterState.timeout === 'long') {
            return timeout > 3600;
        }
        return true;
    }

    function filterTasks(tasks) {
        var keyword = normalizeSearchText(filterState.keyword);
        return (tasks || []).filter(function (task) {
            if (keyword && getTaskSearchText(task, filterState.field).indexOf(keyword) === -1) {
                return false;
            }
            if (filterState.status === 'enabled' && !task.isEnabled) {
                return false;
            }
            if (filterState.status === 'disabled' && task.isEnabled) {
                return false;
            }
            if (!matchesTimeoutFilter(task)) {
                return false;
            }
            if (!matchesCronFilter(task)) {
                return false;
            }
            return true;
        });
    }

    function updateTaskFilterCount() {
        var countElement = document.getElementById('taskFilterCount');
        if (countElement) {
            countElement.textContent = allTasks.length + ' / ' + rawTasks.length;
        }
    }

    function refreshTaskTable(options) {
        options = options || {};
        allTasks = sortTasks(filterTasks(rawTasks));
        updateTaskFilterCount();

        if (!tableInitialized) {
            initTable();
            return;
        }

        var targetPage = pageState.curr;
        if (options.resetToFirstPage) {
            targetPage = 1;
        }
        if (options.page && options.page.curr) {
            targetPage = options.page.curr;
        }
        if (options.focusId) {
            var index = allTasks.findIndex(function (item) {
                return item.ID === options.focusId;
            });
            if (index !== -1) {
                targetPage = Math.floor(index / pageState.limit) + 1;
            }
        }

        var reloadOptions = Object.assign({}, options);
        delete reloadOptions.resetToFirstPage;
        delete reloadOptions.focusId;
        reloadOptions.page = getPageOptions(targetPage);
        reloadTable(reloadOptions);
    }

    var svgIcons = {
        run: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 5.5v13l10-6.5-10-6.5Z"></path></svg>',

        close: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12"></path><path d="M18 6 6 18"></path></svg>',
        search: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4 4"></path></svg>',

    };

    function createActionButton(eventName, tip, iconName, extraClass) {
        return '<button type="button" class="action-icon-btn ' + extraClass + '" lay-event="' + eventName + '" data-tip="' + tip + '" title="' + tip + '" aria-label="' + tip + '">' + svgIcons[iconName] + '</button>';
    }

    function renderEllipsisCell(value) {
        var text = value == null ? '' : String(value);
        var escaped = escapeHtml(text);
        return '<span class="cell-ellipsis" title="' + escaped + '">' + escaped + '</span>';
    }

    function renderCommandCell(value, id) {
        var text = value == null ? '' : String(value);
        var escaped = escapeHtml(text);
        return '<span class="cell-ellipsis command-cell" tabindex="0" data-task-id="' + escapeHtml(id) + '">' + escaped + '</span>';
    }

    function statusTpl(d) {
        return '<div class="status-switch-wrap"><input type="checkbox" name="isEnabled" value="' + d.ID + '" lay-skin="switch" lay-text="启用|禁用" lay-filter="statusSwitch" ' + (d.isEnabled ? 'checked' : '') + '></div>';
    }

    var actionToolbar = [
        '<div class="action-buttons">',
        createActionButton('run', '立即运行', 'run', 'action-run'),
        createActionButton('log', '日志', 'log', 'action-log'),
        createActionButton('edit', '编辑', 'edit', 'action-edit'),
        createActionButton('del', '删除', 'delete', 'action-delete'),
        '</div>'
    ].join('');

    function getCols() {
        if (window.innerWidth < 768) {
            return [[
                { field: 'name', title: '任务名', minWidth: 138, sort: true, templet: function (d) { return renderEllipsisCell(d.name); } },
                { field: 'isEnabled', title: '状态', width: 120, sort: true, templet: statusTpl, unresize: true },
                { fixed: 'right', title: '操作', align: 'center', width: 228, toolbar: actionToolbar }
            ]];
        }

        return [[
            { field: 'ID', title: 'ID', width: 80, sort: true, align: 'center' },
            { field: 'name', title: '任务名', minWidth: 138, sort: true, templet: function (d) { return renderEllipsisCell(d.name); } },
            { field: 'isEnabled', title: '状态', width: 120, sort: true, templet: statusTpl, unresize: true },
            { field: 'cron', title: '定时表达式', width: 152, sort: true, templet: function (d) { return renderEllipsisCell(d.cron); } },
            { field: 'workDir', title: '工作目录', minWidth: 220, sort: true, templet: function (d) { return renderEllipsisCell(d.workDir); } },
            { field: 'command', title: '任务命令', minWidth: 430, sort: true, templet: function (d) { return renderCommandCell(d.command, d.ID); } },
            { fixed: 'right', title: '操作', align: 'center', width: 228, toolbar: actionToolbar }
        ]];
    }

    function handleTableDone(_, curr) {
        closeCommandPopover();
        pageState.curr = curr || pageState.curr || 1;
        if (this.limit) {
            pageState.limit = this.limit;
        }
        form.render('checkbox');
    }

    function initTable() {
        table.render({
            elem: '#taskTable',
            id: TABLE_ID,
            data: allTasks,
            cols: getCols(),
            height: getTableHeight(),
            page: getPageOptions(pageState.curr),
            limit: pageState.limit,
            lineStyle: 'height: 54px;',
            autoSort: false,
            initSort: getInitSort(),
            skin: 'line',
            even: true,
            text: {
                none: '暂无任务，请先添加'
            },
            done: handleTableDone
        });
        tableInitialized = true;
    }

    function reloadTable(options) {
        var nextPage = pageState.curr;
        if (options && options.page && options.page.curr) {
            nextPage = options.page.curr;
        }

        var maxPage = Math.max(1, Math.ceil(Math.max(allTasks.length, 1) / pageState.limit));
        nextPage = Math.min(nextPage, maxPage);

        table.reload(TABLE_ID, Object.assign({
            data: allTasks,
            cols: getCols(),
            height: getTableHeight(),
            page: getPageOptions(nextPage),
            limit: pageState.limit,
            lineStyle: 'height: 54px;',
            autoSort: false,
            initSort: getInitSort(),
            done: handleTableDone
        }, options || {}));
    }

    async function requestJSON(url, options) {
        var response = await fetch(url, options || {});
        var text = await response.text();
        var data = {};

        if (text) {
            try {
                data = JSON.parse(text);
            } catch (error) {
                data = { message: text };
            }
        }

        if (!response.ok) {
            throw new Error(data.error || data.message || '请求失败');
        }

        return data;
    }

    async function loadTasks(options) {
        var result = await requestJSON('/api/tasks');
        rawTasks = result.data || [];
        refreshTaskTable(options);
    }

    function updateTaskLocal(id, patch) {
        var index = rawTasks.findIndex(function (item) {
            return item.ID === id;
        });
        if (index === -1) {
            return;
        }
        rawTasks[index] = Object.assign({}, rawTasks[index], patch);
        refreshTaskTable();
    }

    function getTaskById(id) {
        var taskId = Number(id);
        return rawTasks.find(function (item) {
            return Number(item.ID) === taskId;
        });
    }

    function getCommandTextFromCell(cell) {
        var task = getTaskById(cell.getAttribute('data-task-id'));
        if (task) {
            return String(task.command || '');
        }
        return cell.textContent || '';
    }

    function ensureCommandPopover() {
        if (commandPopover) {
            return;
        }

        commandPopover = document.createElement('div');
        commandPopover.className = 'command-popover';
        commandPopover.innerHTML = [
            '<div class="command-popover__header">',
            '<div class="command-popover__title">任务命令</div>',
            '<button type="button" class="command-popover__copy" title="复制任务命令" aria-label="复制任务命令">',
            svgIcons.copy,
            '</button>',
            '</div>',
            '<div class="command-popover__body">',
            '<pre class="command-popover__code"></pre>',
            '</div>'
        ].join('');

        document.body.appendChild(commandPopover);
        commandPopoverCode = commandPopover.querySelector('.command-popover__code');

        commandPopover.addEventListener('mouseenter', cancelCommandHide);
        commandPopover.addEventListener('mouseleave', scheduleCloseCommandPopover);
        commandPopover.addEventListener('focusout', function (event) {
            var nextTarget = event.relatedTarget;
            if (nextTarget && (commandPopover.contains(nextTarget) || (nextTarget.closest && nextTarget.closest('.command-cell')))) {
                return;
            }
            scheduleCloseCommandPopover();
        });

        commandPopover.querySelector('.command-popover__copy').addEventListener('click', function () {
            copyCommandText(commandPopoverCode.textContent || '');
        });
    }

    function fallbackCopyText(text) {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', 'readonly');
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        textarea.style.top = '0';
        document.body.appendChild(textarea);
        textarea.select();
        var success = document.execCommand('copy');
        document.body.removeChild(textarea);
        if (!success) {
            throw new Error('copy failed');
        }
    }

    async function copyCommandText(text) {
        try {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
            } else {
                fallbackCopyText(text);
            }
            layer.msg('已复制任务命令', { icon: 1, time: 1200 });
        } catch (error) {
            layer.msg('复制失败，请手动选中文本复制', { icon: 2, time: 1800 });
        }
    }

    function cancelCommandHide() {
        if (commandHideTimer) {
            clearTimeout(commandHideTimer);
            commandHideTimer = null;
        }
    }

    function scheduleCloseCommandPopover() {
        cancelCommandHide();
        commandHideTimer = setTimeout(closeCommandPopover, 180);
    }

    function closeCommandPopover() {
        cancelCommandHide();
        activeCommandCell = null;
        if (commandPopover) {
            commandPopover.classList.remove('is-open');
        }
    }

    function showCommandPopover(cell) {
        var text = getCommandTextFromCell(cell);
        ensureCommandPopover();
        cancelCommandHide();
        activeCommandCell = cell;
        commandPopoverCode.textContent = text;
        commandPopover.classList.add('is-open');
        positionCommandPopover(cell);
    }

    function positionCommandPopover(cell) {
        var margin = 12;
        var gap = 8;
        var cellRect = cell.getBoundingClientRect();
        var popoverRect = commandPopover.getBoundingClientRect();
        var left = cellRect.left;
        var top = cellRect.bottom + gap;

        if (left + popoverRect.width > window.innerWidth - margin) {
            left = window.innerWidth - popoverRect.width - margin;
        }
        if (top + popoverRect.height > window.innerHeight - margin) {
            top = cellRect.top - popoverRect.height - gap;
        }

        commandPopover.style.left = Math.max(margin, Math.round(left)) + 'px';
        commandPopover.style.top = Math.max(margin, Math.round(top)) + 'px';
    }

    function closeTooltip() {
        if (tooltipIndex !== null) {
            layer.close(tooltipIndex);
            tooltipIndex = null;
        }
    }

    function bindTooltipEvents() {
        document.body.addEventListener('mouseover', function (event) {
            var button = event.target.closest('.action-icon-btn');
            if (!button || button.contains(event.relatedTarget)) {
                return;
            }
            closeTooltip();
            tooltipIndex = layer.tips(button.getAttribute('data-tip') || button.title, button, {
                tips: [1, '#111827'],
                time: 0
            });
        });

        document.body.addEventListener('mouseout', function (event) {
            var button = event.target.closest('.action-icon-btn');
            if (!button || button.contains(event.relatedTarget)) {
                return;
            }
            closeTooltip();
        });

        document.body.addEventListener('focusin', function (event) {
            var button = event.target.closest('.action-icon-btn');
            if (!button) {
                return;
            }
            closeTooltip();
            tooltipIndex = layer.tips(button.getAttribute('data-tip') || button.title, button, {
                tips: [1, '#111827'],
                time: 0
            });
        });

        document.body.addEventListener('focusout', function (event) {
            if (event.target.closest('.action-icon-btn')) {
                closeTooltip();
            }
        });
    }

    function bindCommandPopoverEvents() {
        document.body.addEventListener('mouseover', function (event) {
            var cell = event.target.closest('.command-cell');
            if (!cell || cell.contains(event.relatedTarget)) {
                return;
            }
            showCommandPopover(cell);
        });

        document.body.addEventListener('mouseout', function (event) {
            var cell = event.target.closest('.command-cell');
            if (!cell || cell.contains(event.relatedTarget)) {
                return;
            }
            if (commandPopover && commandPopover.contains(event.relatedTarget)) {
                return;
            }
            scheduleCloseCommandPopover();
        });

        document.body.addEventListener('focusin', function (event) {
            var cell = event.target.closest('.command-cell');
            if (cell) {
                showCommandPopover(cell);
            }
        });

        document.body.addEventListener('focusout', function (event) {
            var cell = event.target.closest('.command-cell');
            if (!cell) {
                return;
            }
            if (commandPopover && commandPopover.contains(event.relatedTarget)) {
                return;
            }
            scheduleCloseCommandPopover();
        });

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeCommandPopover();
            }
        });

        document.addEventListener('scroll', function (event) {
            if (!activeCommandCell || (commandPopover && commandPopover.contains(event.target))) {
                return;
            }
            closeCommandPopover();
        }, true);
    }

    function bindTaskFilterEvents() {
        var keywordInput = document.getElementById('taskKeyword');
        var fieldSelect = document.getElementById('taskSearchField');
        var statusSelect = document.getElementById('taskStatusFilter');
        var timeoutSelect = document.getElementById('taskTimeoutFilter');
        var cronSelect = document.getElementById('taskCronFilter');
        var resetButton = document.getElementById('resetTaskFilters');

        var applyKeywordFilter = debounce(function () {
            filterState.keyword = keywordInput.value;
            closeCommandPopover();
            refreshTaskTable({ resetToFirstPage: true });
        }, 180);

        keywordInput.addEventListener('input', applyKeywordFilter);

        fieldSelect.addEventListener('change', function () {
            filterState.field = fieldSelect.value;
            closeCommandPopover();
            refreshTaskTable({ resetToFirstPage: true });
        });

        statusSelect.addEventListener('change', function () {
            filterState.status = statusSelect.value;
            closeCommandPopover();
            refreshTaskTable({ resetToFirstPage: true });
        });

        timeoutSelect.addEventListener('change', function () {
            filterState.timeout = timeoutSelect.value;
            closeCommandPopover();
            refreshTaskTable({ resetToFirstPage: true });
        });

        cronSelect.addEventListener('change', function () {
            filterState.cron = cronSelect.value;
            closeCommandPopover();
            refreshTaskTable({ resetToFirstPage: true });
        });

        resetButton.addEventListener('click', function () {
            filterState = {
                keyword: '',
                field: 'all',
                status: 'all',
                timeout: 'all',
                cron: 'all'
            };
            keywordInput.value = '';
            fieldSelect.value = filterState.field;
            statusSelect.value = filterState.status;
            timeoutSelect.value = filterState.timeout;
            cronSelect.value = filterState.cron;
            closeCommandPopover();
            refreshTaskTable({ resetToFirstPage: true });
        });
    }

    function normalizeTaskPayload(formElement) {
        var raw = Object.fromEntries(new FormData(formElement).entries());
        var timeout = parseInt(raw.timeout, 10);
        return {
            name: String(raw.name || '').trim(),
            cron: String(raw.cron || '').trim(),
            workDir: String(raw.workDir || '').trim(),
            command: String(raw.command || '').trim(),
            timeout: Number.isNaN(timeout) ? 86400 : timeout
        };
    }

    function showTaskForm(data) {
        if (data && data.isEnabled) {
            layer.msg('请先禁用任务再修改', { icon: 5 });
            return;
        }

        var formId = 'task-form-' + Date.now();
        var closeBtnId = 'task-close-btn-' + Date.now();
        var title = data ? '编辑任务' : '添加任务';
        var screenWidth = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
        var maxWidth = Math.min(720, screenWidth - 24);

        var content = `
            <div class="form-shell">
                <form class="layui-form" id="${formId}">
                    <div class="layui-form-item">
                        <label class="layui-form-label">任务名</label>
                        <div class="layui-input-block">
                            <input type="text" name="name" required lay-verify="required" placeholder="请输入任务名" class="layui-input" value="${escapeHtml(data ? data.name : '')}">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">定时表达式</label>
                        <div class="layui-input-block">
                            <input type="text" name="cron" required lay-verify="required" placeholder="请输入 Cron 表达式" class="layui-input" value="${escapeHtml(data ? data.cron : '')}">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">工作目录</label>
                        <div class="layui-input-block">
                            <input type="text" name="workDir" required lay-verify="required" placeholder="请输入工作目录" class="layui-input" value="${escapeHtml(data ? data.workDir : '')}">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">任务命令</label>
                        <div class="layui-input-block">
                            <textarea name="command" placeholder="请输入任务命令" class="layui-textarea">${escapeHtml(data ? data.command : '')}</textarea>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">超时时间</label>
                        <div class="layui-input-block">
                            <input type="number" name="timeout" required lay-verify="required" placeholder="请输入超时时间(秒)" class="layui-input" value="${escapeHtml(data ? data.timeout : '86400')}">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="layui-btn"><span class="button-svg">${svgIcons.save}</span>保存</button>
                        <button type="button" class="layui-btn layui-btn-primary" id="${closeBtnId}"><span class="button-svg">${svgIcons.close}</span>关闭</button>
                    </div>
                </form>
            </div>
        `;

        var layerIndex = layer.open({
            type: 1,
            title: title,
            area: [maxWidth + 'px', '590px'],
            maxmin: true,
            shade: 0.22,
            shadeClose: true,
            resize: true,
            content: content,
            success: function (layero) {
                var root = layero[0] || layero;
                var formElement = root.querySelector('#' + formId);
                var closeBtn = root.querySelector('#' + closeBtnId);
                var submitBtn = formElement.querySelector('button[type="submit"]');

                form.render();

                closeBtn.addEventListener('click', function () {
                    layer.close(layerIndex);
                });

                formElement.addEventListener('submit', async function (event) {
                    event.preventDefault();

                    var taskData = normalizeTaskPayload(formElement);
                    if (!taskData.name || !taskData.cron || !taskData.workDir || !taskData.command) {
                        layer.msg('请完整填写任务信息', { icon: 2 });
                        return;
                    }

                    submitBtn.disabled = true;
                    submitBtn.classList.add('layui-btn-disabled');

                    try {
                        var url = data ? '/api/tasks/' + data.ID : '/api/tasks';
                        var method = data ? 'PUT' : 'POST';
                        var result = await requestJSON(url, {
                            method: method,
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(taskData)
                        });

                        layer.close(layerIndex);
                        await loadTasks({
                            focusId: result.ID,
                            resetToFirstPage: !data
                        });
                        layer.msg(data ? '任务更新成功' : '任务添加成功', { icon: 1 });
                    } catch (error) {
                        layer.msg(error.message || (data ? '任务更新失败' : '任务添加失败'), { icon: 2 });
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('layui-btn-disabled');
                    }
                });
            }
        });
    }

    async function toggleTaskStatus(id, isEnabled, elem) {
        try {
            await requestJSON('/api/tasks/' + id + '/toggle', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ isEnabled: isEnabled })
            });
            updateTaskLocal(Number(id), { isEnabled: isEnabled });
            layer.msg('状态更新成功', { icon: 1 });
        } catch (error) {
            layer.msg('状态更新失败：' + (error.message || '未知错误'), { icon: 2 });
            elem.checked = !isEnabled;
            form.render('checkbox');
        }
    }

    async function runTask(id) {
        try {
            await requestJSON('/api/tasks/' + id + '/run', { method: 'POST' });
            layer.msg('任务已开始运行', { icon: 1 });
        } catch (error) {
            layer.msg(error.message || '运行失败', { icon: 2 });
        }
    }

    async function deleteTask(id, isEnabled) {
        if (isEnabled) {
            layer.msg('已启用任务不允许删除，请先禁用', { icon: 2 });
            return;
        }

        layer.confirm('确定删除这个任务吗？', { icon: 3, title: '删除确认' }, async function (index) {
            try {
                await requestJSON('/api/tasks/' + id, { method: 'DELETE' });
                layer.close(index);
                await loadTasks();
                layer.msg('删除成功', { icon: 1 });
            } catch (error) {
                layer.msg(error.message || '删除失败', { icon: 2 });
            }
        });
    }

    function showLogs(id) {
        var source;
        var maxLines = 800;

        layer.open({
            type: 1,
            title: '任务日志',
            area: ['90%', '80%'],
            shadeClose: true,
            moveType: 1,
            maxmin: true,
            content: `
                <div id="logWrapper" style="display: flex; flex-direction: column; height: 100%;">
                    <div class="log-controls" style="flex: 0 0 auto; padding: 10px;">
                        <div class="control-group">
                            <label class="switch">
                                <input type="checkbox" id="autoScroll" checked>
                                <span class="slider round"></span>
                            </label>
                            <span>自动滚动</span>
                        </div>
                        <button id="clearLogs" class="btn"><span class="button-svg">${svgIcons.delete}</span> 清空日志</button>
                        <div class="control-group">
                            <label for="maxLines">最大行数:</label>
                            <input type="number" id="maxLines" value="800" min="100" step="100">
                        </div>
                        <div class="search-container">
                            <input type="text" id="filterLogs" placeholder="筛选日志...">
                            <span class="inline-svg">${svgIcons.search}</span>
                        </div>
                    </div>
                    <div id="logContainer" class="terminal" style="flex: 1 1 auto; overflow-y: auto;"></div>
                </div>
            `,
            success: function () {
                var logContainer = document.getElementById('logContainer');
                var autoScrollCheckbox = document.getElementById('autoScroll');
                var clearLogsButton = document.getElementById('clearLogs');
                var filterLogsInput = document.getElementById('filterLogs');
                var maxLinesInput = document.getElementById('maxLines');
                var logLines = [];

                function updateLogDisplay() {
                    var filteredLines = filterLogsInput.value
                        ? logLines.filter(function (line) {
                            return line.indexOf(filterLogsInput.value) !== -1;
                        })
                        : logLines;

                    logContainer.textContent = filteredLines.join('\n');
                    if (autoScrollCheckbox.checked) {
                        logContainer.scrollTop = logContainer.scrollHeight;
                    }
                }

                function trimLogLines() {
                    while (logLines.length > maxLines) {
                        logLines.shift();
                    }
                }

                maxLinesInput.onchange = function () {
                    maxLines = parseInt(this.value, 10) || 800;
                    trimLogLines();
                    updateLogDisplay();
                };

                source = new EventSource('/api/tasks/' + id + '/logs');
                source.onmessage = function (event) {
                    logLines.push(event.data);
                    trimLogLines();
                    updateLogDisplay();
                };

                clearLogsButton.onclick = function () {
                    logLines = [];
                    updateLogDisplay();
                };

                filterLogsInput.oninput = updateLogDisplay;
            },
            end: function () {
                if (source) {
                    source.close();
                }
            }
        });
    }

    form.on('switch(statusSwitch)', function (obj) {
        toggleTaskStatus(this.value, obj.elem.checked, obj.elem);
    });

    table.on('tool(taskTable)', function (obj) {
        var data = obj.data;
        if (obj.event === 'run') {
            runTask(data.ID);
            return;
        }
        if (obj.event === 'log') {
            showLogs(data.ID);
            return;
        }
        if (obj.event === 'edit') {
            showTaskForm(data);
            return;
        }
        if (obj.event === 'del') {
            deleteTask(data.ID, data.isEnabled);
        }
    });

    table.on('sort(taskTable)', function (obj) {
        sortState = obj.type ? {
            field: obj.field,
            type: obj.type
        } : {
            field: DEFAULT_SORT.field,
            type: DEFAULT_SORT.type
        };
        refreshTaskTable({
            initSort: getInitSort(),
            page: getPageOptions(1)
        });
    });

    table.on('rowDouble(taskTable)', function (obj) {
        if (obj.data && obj.data.ID) {
            showTaskForm(obj.data);
        }
    });

    document.getElementById('addTaskBtn').addEventListener('click', function () {
        showTaskForm();
    });

    window.addEventListener('resize', debounce(function () {
        closeCommandPopover();
        if (tableInitialized) {
            reloadTable();
        }
    }, 160));

    bindTooltipEvents();
    bindCommandPopoverEvents();
    bindTaskFilterEvents();
    loadTasks({ resetToFirstPage: true }).catch(function (error) {
        layer.msg(error.message || '加载任务列表失败', { icon: 2 });
    });
});
</script>
</body>
</html>
